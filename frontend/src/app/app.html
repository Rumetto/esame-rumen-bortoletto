<main>
  <section class="card">
    <p class="eyebrow">Progetto d'esame ITS</p>
    <h1>Angular + PHP Slim</h1>
    <p>Lo scheletro dell'applicazione è pronto.</p>

    <div
      class="status"
      [class.online]="connected()"
      [class.loading]="loading()"
    >
      <span class="status-dot" aria-hidden="true"></span>
      <div>
        <strong>{{ loading() ? 'Connessione...' : connected() ? 'API online' : 'API offline' }}</strong>
        <p>{{ message() }}</p>
      </div>
    </div>
  </section>
</main>
